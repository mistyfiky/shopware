when@prod: &shopware_prod
  parameters:
    s3.common: &s3-common
      type: "amazon-s3"
      config:
        bucket: "%env(resolve:S3_BUCKET)%"
        region: "%env(resolve:S3_REGION)%"
        endpoint: "%env(resolve:S3_ENDPOINT)%"
        credentials:
          key: "%env(resolve:S3_ACCESS_KEY)%"
          secret: "%env(resolve:S3_SECRET_KEY)%"
        use_path_style_endpoint: true

  shopware:
    admin_worker:
      enable_admin_worker: false
    api:
      max_limit: 1000
    auto_update:
      enabled: false
    filesystem:
      public:
        <<: *s3-common
        url: "%env(resolve:S3_URL)%"
      private:
        <<: *s3-common
        visibility: "private"
      theme:
        <<: *s3-common
        url: "%env(resolve:S3_URL)%"
      asset:
        <<: *s3-common
        url: "%env(resolve:S3_URL)%"
      sitemap:
        <<: *s3-common
        url: "%env(resolve:S3_URL)%"
    increment:
      user_activity:
  #      type: "array"
        type: "redis"
        config:
          url: "%env(resolve:REDIS_LOCK_DSN)%"
      message_queue:
  #      type: "array"
        type: "redis"
        config:
          url: "%env(resolve:REDIS_LOCK_DSN)%"
    mail:
      update_mail_variables_on_send: false
  #  number_range:
  #    increment_storage: "Redis"
  #    redis_url: "%env(resolve:REDIS_NUMBER_DSN)%"
    store:
      frw: false

when@dev: *shopware_prod
